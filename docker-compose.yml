version: "3.8"

services:
  dokoga:
    build:
      context: .
      dockerfile: Dockerfile
    # Removed container_name to allow Docker Compose to spin up multiple replicas
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    volumes:
      - dokoga_data:/app/data
    deploy:
      replicas: 3 # High availability: scale to 3 active replicas by default!

  nginx:
    image: nginx:alpine
    container_name: dokoga_lb
    ports:
      - "8000:80" # Bind Nginx to host port 8000 as our single public load-balanced entrypoint
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dokoga
    restart: unless-stopped

volumes:
  dokoga_data:
    driver: local
